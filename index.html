<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Me an SMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      max-width: 400px;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 12px;
    }
    p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }
    a.sms-btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    a.sms-btn:hover {
      background: #1d4ed8;
    }
    small {
      display: block;
      margin-top: 12px;
      color: #888;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Contact via SMS</h1>
    <p>Tap the button below to open your SMS app with a pre‑filled message.</p>

    <!-- Your SMS link -->
    <a
      class="sms-btn"
      href="sms:+919826425086?&body=Hello%20%E2%80%94%20this%20is%20%5BYour%20Name%5D.%20I%E2%80%99d%20like%20to%20discuss%20%5Breason%5D.%20Please%20reply%20or%20call%20me%20at%20%5Byour%20number%5D.%20Thank%20you">
      Send SMS
    </a>

    <small>This works on most smartphones that support sms: links.</small>
  </div>
</body>
</html>
